name: Scheduled notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification scheduler
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SCHEDULE_URL: ${{ secrets.SCHEDULE_URL }}
        run: |
          test -n "${CRON_SECRET}" || (echo "CRON_SECRET is not set" && exit 1)
          test -n "${SCHEDULE_URL}" || (echo "SCHEDULE_URL is not set" && exit 1)
          url="${SCHEDULE_URL%/}/api/notifications/schedule"
          curl -fsS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${url}"
